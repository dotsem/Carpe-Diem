name: CI Build Check

on:
    push:
        branches: [main, master]
        paths-ignore:
            - ".github/workflows/**"
            - "**.md"
    pull_request:
        branches: [main, master]
        paths-ignore:
            - ".github/workflows/**"
            - "**.md"

jobs:
    build-linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  cache: true
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libglib2.0-dev
            - run: flutter pub get
            - run: flutter build linux --debug

    build-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4
            - uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  cache: true
            - run: flutter pub get
            - run: flutter build macos --debug

    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  cache: true
            - run: flutter pub get
            - run: flutter build windows --debug
